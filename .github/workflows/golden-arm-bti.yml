name: "Golden: ARM BTI"

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  TOOLCHAIN: ghcr.io/${{ github.repository }}/toolchain-

jobs:
  build-glibc:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc13-clang18-arm64:v1 \
            sh test/e2e/elf/arm-bti/build.sh glibc
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: glibc-binaries
          path: binaries/

  build-musl:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc13-clang18-musl-arm64:v1 \
            sh test/e2e/elf/arm-bti/build.sh musl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: musl-binaries
          path: binaries/

  merge:
    runs-on: ubuntu-latest
    needs: [build-glibc, build-musl]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: all-binaries
          pattern: "*-binaries"
          merge-multiple: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: arm-bti-binaries
          path: all-binaries/
