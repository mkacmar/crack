name: "Golden: Build"

# actions/checkout v6.0.2: de0fac2e4500dabe0009e67214ff5f5447ce83dd
# actions/download-artifact v4.3.0: d3f86a106a0bac45b974a628896c90dbdf5c8093
# actions/upload-artifact v4.6.2: ea165f8d65b6e75b540449e92b4886f43607fa02
# docker/setup-qemu-action v4.0.0: ce360397dd3f832beb865e1373c09c0e9f86d70a

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      rule:
        required: true
        type: string
      amd64:
        required: false
        type: boolean
        default: true
      arm64:
        required: false
        type: boolean
        default: true
      arm:
        required: false
        type: boolean
        default: true
      riscv64:
        required: false
        type: boolean
        default: true

env:
  TOOLCHAIN: ghcr.io/${{ github.repository }}/toolchain-

jobs:
  build-amd64:
    if: inputs.amd64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc13-clang18-amd64:v1 \
            sh test/e2e/elf/${{ inputs.rule }}/build.sh amd64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: binaries-amd64
          path: binaries/

  build-arm64:
    if: inputs.arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc13-clang18-arm64:v1 \
            sh test/e2e/elf/${{ inputs.rule }}/build.sh arm64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: binaries-arm64
          path: binaries/

  build-arm:
    if: inputs.arm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          platforms: arm
      - name: Build binaries
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc13-clang18-musl-armv7:v1 \
            sh test/e2e/elf/${{ inputs.rule }}/build.sh arm
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: binaries-arm
          path: binaries/

  build-riscv64:
    if: inputs.riscv64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          platforms: riscv64
      - name: Build binaries
        run: |
          docker run --rm --platform linux/riscv64 \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}gcc14-clang19-musl-riscv64:v1 \
            sh test/e2e/elf/${{ inputs.rule }}/build.sh riscv64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: binaries-riscv64
          path: binaries/

  merge:
    runs-on: ubuntu-latest
    if: always() && !failure() && !cancelled()
    needs: [build-amd64, build-arm64, build-arm, build-riscv64]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: all-binaries
          pattern: binaries-*
          merge-multiple: true

      - name: List all binaries
        run: ls -la all-binaries/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ inputs.rule }}-binaries
          path: all-binaries/
