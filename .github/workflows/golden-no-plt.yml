name: "Golden: No PLT"

on:
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build binaries
        run: sh test/e2e/no-plt/build.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: no-plt-x86_64
          path: binaries/

  build-i386:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib
      - name: Build binaries
        run: sh test/e2e/no-plt/build.sh i386
      - uses: actions/upload-artifact@v4
        with:
          name: no-plt-i386
          path: binaries/

  merge:
    runs-on: ubuntu-24.04
    needs: [build-x86_64, build-i386]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true
      - uses: actions/upload-artifact@v4
        with:
          name: no-plt-binaries
          path: binaries/
