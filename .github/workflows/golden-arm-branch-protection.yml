name: "Golden: ARM Branch Protection"

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  TOOLCHAIN: ghcr.io/${{ github.repository }}/toolchain-

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            ${{ env.TOOLCHAIN }}glibc-pac-arm64:v1 \
            sh test/e2e/elf/arm-branch-protection/build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: arm-branch-protection-binaries
          path: binaries/
